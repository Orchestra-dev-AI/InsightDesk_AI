# ──────────────────────────────────────────────────────────────────────────────
# InsightDesk AI — Render Blueprint (Infrastructure as Code)
# This file auto-configures both backend services on Render.
#
# Usage:
#   1. Go to dashboard.render.com → New + → Blueprint
#   2. Select this repository → Apply
#   3. Both services deploy automatically with correct settings.
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ── Service 1: Core Intelligence ──────────────────────────────────────────
  - type: web
    name: insightdesk-core
    runtime: python
    region: singapore
    plan: free
    rootDir: core-intelligence
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: MCP_SERVER_URL
        value: http://localhost:8100
      - key: MCP_API_KEY
        value: mock-enterprise-key
      - key: PRIMARY_LLM_PROVIDER
        value: gemini

  # ── Service 2: Platform Infrastructure ────────────────────────────────────
  - type: web
    name: insightdesk-infra
    runtime: python
    region: singapore
    plan: free
    rootDir: platform-infra
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: INFRA_SLA_ACCURACY
        value: "0.98"
      - key: INFRA_SLA_LATENCY_MS
        value: "300.0"
      - key: INFRA_SLA_MOS_SCORE
        value: "4.3"
      - key: INFRA_SLA_RESOLUTION_RATE
        value: "0.80"
